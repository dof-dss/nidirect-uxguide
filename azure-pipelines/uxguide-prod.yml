trigger:
  branches:
    include:
      - main

variables:
  storageAccountName: uxguide2
  buildOutputFolder: site

steps:
# -------------------------
# Build / Prepare Step
# -------------------------
- script: |
    set -euo pipefail

    echo "Preparing static site output..."
    rm -rf site
    mkdir site

    # Copy only what should be publicly deployed
    cp -R \
      index.html \
      404.html \
      assets \
      css \
      js \
      images \
      site/

    echo "✅ Static site prepared in ./site"
  displayName: 'Prepare static site files'

# -------------------------
# Deploy Step
# -------------------------
- task: AzureCLI@2
  displayName: 'Upload static site to Azure Storage ($web)'
  inputs:
    azureSubscription: 'EDD-General-Prod'
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      set -euo pipefail

      STORAGE_ACCOUNT_NAME="$(storageAccountName)"
      SOURCE_FOLDER="$(buildOutputFolder)"

      echo "Enabling static website hosting..."
      az storage blob service-properties update \
        --account-name "$STORAGE_ACCOUNT_NAME" \
        --static-website \
        --index-document index.html \
        --404-document 404.html

      echo "Uploading static site files to \$web..."
      az storage blob upload-batch \
        --account-name "$STORAGE_ACCOUNT_NAME" \
        --source "$SOURCE_FOLDER" \
        --destination "\$web" \
        --overwrite true

      echo "Setting cache headers..."

      az storage blob update-batch \
        --account-name "$STORAGE_ACCOUNT_NAME" \
        --destination "\$web" \
        --pattern "*.html" \
        --content-cache-control "no-cache"

      az storage blob update-batch \
        --account-name "$STORAGE_ACCOUNT_NAME" \
        --destination "\$web" \
        --pattern "*.css" \
        --content-cache-control "public, max-age=31536000, immutable"

      az storage blob update-batch \
        --account-name "$STORAGE_ACCOUNT_NAME" \
        --destination "\$web" \
        --pattern "*.js" \
        --content-cache-control "public, max-age=31536000, immutable"

      echo "✅ Deployment complete."
``
