trigger:
  branches:
    include:
      - main

variables:
  storageAccountName: uxguide2
  buildOutputFolder: dist   # change if your framework outputs elsewhere

steps:
# -------------------------
# Build Step
# -------------------------
- task: NodeTool@0
  displayName: 'Use Node.js LTS'
  inputs:
    versionSpec: '20.x'

- script: |
    set -euo pipefail
    npm ci
    npm run build
  displayName: 'Build static site'

# -------------------------
# Deploy Step
# -------------------------
- task: AzureCLI@2
  displayName: 'Upload static site to Azure Storage ($web)'
  inputs:
    azureSubscription: 'EDD-General-Prod'
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      set -euo pipefail

      STORAGE_ACCOUNT_NAME="$(storageAccountName)"
      SOURCE_FOLDER="$(buildOutputFolder)"

      echo "Enabling static website hosting..."
      az storage blob service-properties update \
        --account-name "$STORAGE_ACCOUNT_NAME" \
        --static-website \
        --index-document index.html \
        --404-document 404.html

      echo "Uploading static site files from $SOURCE_FOLDER to \$web..."
      az storage blob upload-batch \
        --account-name "$STORAGE_ACCOUNT_NAME" \
        --source "$SOURCE_FOLDER" \
        --destination "\$web" \
        --overwrite true

      echo "Setting cache-control headers..."

      az storage blob update-batch \
        --account-name "$STORAGE_ACCOUNT_NAME" \
        --destination "\$web" \
        --pattern "*.html" \
        --content-cache-control "no-cache"

      az storage blob update-batch \
        --account-name "$STORAGE_ACCOUNT_NAME" \
        --destination "\$web" \
        --pattern "*.js" \
        --content-cache-control "public, max-age=31536000, immutable"

      az storage blob update-batch \
        --account-name "$STORAGE_ACCOUNT_NAME" \
        --destination "\$web" \
        --pattern "*.css" \
        --content-cache-control "public, max-age=31536000, immutable"

      echo "✅ Static site deployment complete."
