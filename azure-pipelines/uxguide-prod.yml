trigger:
  branches:
    include:
      - main

steps:
- task: AzureCLI@2
  displayName: 'Upload static site to Azure Storage ($web)'
  inputs:
    azureSubscription: 'EDD-General-Prod'
    scriptType: 'bash'
    scriptLocation: 'inlineScript'
    inlineScript: |
      set -euo pipefail

      STORAGE_ACCOUNT_NAME="uxguide2"
      STAGING_DIR=".deploy"

      echo "Cleaning staging directory..."
      rm -rf "$STAGING_DIR"
      mkdir "$STAGING_DIR"

      echo "Staging files using .gitignore..."
      rsync -av \
        --delete \
        --exclude-from=.gitignore \
        --exclude=".git" \
        ./ "$STAGING_DIR/"

      echo "Enabling static website..."
      az storage blob service-properties update \
        --account-name "$STORAGE_ACCOUNT_NAME" \
        --static-website \
        --index-document index.html \
        --404-document 404.html

      echo "Retrieving storage account key..."
      STORAGE_KEY=$(az storage account keys list \
        --account-name "$STORAGE_ACCOUNT_NAME" \
        --query "[0].value" \
        --output tsv)

      echo "Uploading staged site using AzCopy..."
      azcopy copy "$STAGING_DIR" \
        "https://${STORAGE_ACCOUNT_NAME}.blob.core.windows.net/\$web" \
        --recursive \
        --overwrite=true \
        --from-to=LocalBlob \
        --blob-type BlockBlob \
        --account-key "$STORAGE_KEY"

      echo "✅ Upload complete."
